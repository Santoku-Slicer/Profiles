deretract_speed = 0
end_gcode = M104 S0                                    ; Extruder off \nM140 S0                                    ; Heatbed off \nM107                                       ; Fan off \nG91                                        ; relative positioning \nG1 E-5 F3000  \nG1 Z+0.3 F3000                             ; lift print head \nG28 X0  F3000\nM84                                        ; disable stepper motors
extra_loading_move = -2
extruder_colour = #FFFFFF
extruder_offset = 0x0
gcode_flavor = marlin
high_current_on_filament_swap = 0
host_type = octoprint
inherits = 
layer_gcode = ; AFTER_LAYER_CHANGE [layer_num] @ [layer_z]mm
machine_limits_usage = emit_to_gcode
machine_max_acceleration_e = 2500
machine_max_acceleration_extruding = 2500
machine_max_acceleration_retracting = 2500
machine_max_acceleration_travel = 3000,1250
machine_max_acceleration_x = 2500
machine_max_acceleration_y = 2500
machine_max_acceleration_z = 800
machine_max_feedrate_e = 80
machine_max_feedrate_x = 250
machine_max_feedrate_y = 250
machine_max_feedrate_z = 8
machine_max_jerk_e = 10
machine_max_jerk_x = 10
machine_max_jerk_y = 10
machine_max_jerk_z = 2
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
max_layer_height = 0.28
max_print_height = 250
min_layer_height = 0.04
nozzle_diameter = 0.4
parking_pos_retraction = 92
pause_print_gcode = M601
print_host = 
printer_model = KOBRA2 NEO
printer_notes = Do not remove the following keywords! These keywords are used in the "compatible printer" condition of the print and filament profiles to link the particular print and filament profiles to this printer profile.\nPRINTER_VENDOR_ANYCUBIC\nPRINTER_MODEL_KOBRA2_NEO
printer_settings_id =
printer_technology = FFF
printer_variant = 0.4
printer_vendor = Anycubic
printhost_apikey = 
printhost_cafile = 
remaining_times = 0
retract_before_travel = 5
retract_before_wipe = 70%
retract_layer_change = 1
retract_length = 4
retract_length_toolchange = 1
retract_lift = 0
retract_lift_above = 0
retract_lift_below = 0
