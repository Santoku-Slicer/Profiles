[printer:Anycubic Kobra 2 Neo]
autoemit_temperature_commands = 1
bed_custom_model = 
bed_custom_texture = 
bed_shape = 0x0,220x0,220x220,0x220
rect_size_x = 220
rect_size_y = 220
before_layer_gcode = ; BEFORE_LAYER_CHANGE [layer_num] @ [layer_z]mm
between_objects_gcode = 
