[printer:*Q1 Pro*]
inherits = *common*
printer_model = Q1 Pro
autoemit_temperature_commands = 0
auxiliary_fan = 1
bed_exclude_area = 0x0,0x0,25x240,25x245,115x245,115x240,25x240,0x0,0x0,208x240,208x245,245x245,245x240,208x240,0x0
bed_shape = 0x0,245x0,245x245,0x245
before_layer_gcode = TIMELAPSE_TAKE_FRAME
chamber_temperature_control = 1
max_print_height = 240
retract_lift_below = 239
start_gcode = PRINT_START BED=[first_layer_bed_temperature] HOTEND=[first_layer_temperature] CHAMBER=[chamber_minimal_temperature]\nM83\nM140 S[first_layer_bed_temperature]\nM104 S[first_layer_temperature]\nM141 S[chamber_minimal_temperature]\nG4 P3000\nT[initial_tool]\n{position[0] = max((min(print_bed_max[0], first_layer_print_min[0] + 80) - 85), 0)}\n{position[1] = max((min(print_bed_max[1] - 5, first_layer_print_min[1] + 80) - 85), 0)}\n{position[2] = 0.5 * first_layer_height * nozzle_diameter[0]}\nG0 X{position[0]} Y{position[1]} Z5 F6000\nG0 Z[first_layer_height] F600\nG1 E3 F1800\nG1 X{position[0] + 85} E{85 * position[2]} F3000\nG1 Y{position[1] + 2} E{2 * position[2]}\nG1 X{position[0]} E{85 * position[2]}\nG1 Y{position[1] + 85} E{83 * position[2]}\nG1 X{position[0] + 2} E{2 * position[2]}\nG1 Y{position[1] + 3} E{82 * position[2]}\nG1 X{position[0] + 3} Z0\nG1 X{position[0] + 6}\nG1 Z1 F600\n
thumbnails = 160x160/PNG, 112x112/PNG
wipe_device = 1

