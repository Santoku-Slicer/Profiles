[filament:*PET08PGC1*]
inherits = *PETPGC1*; *C1_CH_PET*
compatible_printers_condition = printer_model=~/(COREONE|COREONEMMU3|COREONEL|COREONELMMU3)/ and nozzle_diameter[0]==0.8 and ! nozzle_high_flow[0]
max_fan_speed = 65
bridge_fan_speed = 65
fan_below_layer_time = 35
slowdown_below_layer_time = 20

