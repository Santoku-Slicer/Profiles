[filament:*PET06PGC1*]
inherits = *PETPGC1*; *C1_CH_PET*
compatible_printers_condition = printer_model=~/(COREONE|COREONEMMU3|COREONEL|COREONELMMU3)/ and nozzle_diameter[0]==0.6 and ! nozzle_high_flow[0]
fan_below_layer_time = 30
enable_dynamic_fan_speeds = 1
overhang_fan_speed_0 = 60
slowdown_below_layer_time = 15

