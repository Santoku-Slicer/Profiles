[filament:*ABSHFC1*]
inherits = *ABSHF4S*; *C1_CH_ABS*; *C1_SH_ABS*
compatible_printers_condition = printer_model=~/(COREONE|COREONEL)/ and nozzle_diameter[0]!=0.8 and nozzle_diameter[0]!=0.6 and nozzle_diameter[0]!=0.5 and nozzle_high_flow[0] and ! single_extruder_multi_material
min_fan_speed = 15
max_fan_speed = 20
bridge_fan_speed = 25
fan_below_layer_time = 30

