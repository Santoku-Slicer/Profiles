[filament:Polymaker PolyDissolve S1 @COREONE]
inherits = Polymaker PolyDissolve S1 @MK4S; *PLAPGC1*; *PG_NOHFC1*
compatible_printers_condition = printer_model=~/(COREONE|COREONEMMU3|COREONEL|COREONELMMU3)/ and nozzle_diameter[0]!=0.6 and nozzle_diameter[0]!=0.8 and ! nozzle_high_flow[0] and ! single_extruder_multi_material
enable_dynamic_fan_speeds = 0
min_fan_speed = 25
max_fan_speed = 25
bridge_fan_speed = 30
chamber_temperature = 0
chamber_minimal_temperature = 0

