[filament:Prusament ASA @COREONE]
inherits = Prusament ASA @MK4; *ABSPGC1*
min_fan_speed = 20
max_fan_speed = 25
slowdown_below_layer_time = 10
bridge_fan_speed = 25
fan_below_layer_time = 20
enable_dynamic_fan_speeds = 1
overhang_fan_speed_0 = 25
first_layer_bed_temperature = 110
compatible_printers_condition = printer_model=~/(COREONE|COREONEMMU3|COREONEL|COREONELMMU3)/ and nozzle_diameter[0]!=0.8 and nozzle_diameter[0]!=0.6 and ! nozzle_high_flow[0]

