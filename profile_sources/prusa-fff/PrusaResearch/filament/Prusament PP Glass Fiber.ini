[filament:Prusament PP Glass Fiber]
inherits = *common*
filament_vendor = Prusa Polymers
first_layer_bed_temperature = 100
bed_temperature = 95
first_layer_temperature = 245
temperature = 245
extrusion_multiplier = 1.03
filament_colour = #FFFFFF
filament_cost = 121.2
filament_density = 1.05
filament_spool_weight = 278
bridge_fan_speed = 100
disable_fan_first_layers = 5
min_fan_speed = 15
max_fan_speed = 20
fan_below_layer_time = 25
filament_retract_before_travel = 2
filament_retract_length = 2
filament_retract_speed = 60
filament_deretract_speed = 20
filament_wipe = 1
filament_retract_before_wipe = 80%
filament_max_volumetric_speed = 5
filament_type = PP
filament_retract_layer_change = 0
start_filament_gcode = "M900 K0 ; Filament gcode"
compatible_printers_condition = nozzle_diameter[0]>=0.4 and printer_notes!~/.*MINI.*/ and printer_notes!~/.*PG.*/ and printer_model!="MK2SMM" and ! single_extruder_multi_material
filament_abrasive = 1

