[printer:Original Prusa MK3.5 & MK3.5S MMU3 0.4 nozzle]
inherits = Original Prusa MK3.5 & MK3.5S 0.4 nozzle; *MK3.5MMU3*
renamed_from = "Original Prusa MK3.5 MMU3 0.4 nozzle"
printer_model = MK3.5MMU3
printer_variant = 0.4
nozzle_diameter = 0.4,0.4,0.4,0.4,0.4
max_layer_height = 0.3,0.3,0.3,0.3,0.3
retract_length = 0.8,0.8,0.8,0.8,0.8
wipe = 1,1,1,1,1
retract_before_wipe = 0,0,0,0,0
retract_speed = 35,35,35,35,35
deretract_speed = 0,0,0,0,0
printer_notes = Don't remove the following keywords. \nPRINTER_VENDOR_PRUSA3D\nPRINTER_MODEL_MK3.5MMU\n
start_gcode = M17 ; enable steppers\nM862.1 P[nozzle_diameter] A{((is_extruder_used[0] and filament_abrasive[0]) ? 1 : (is_extruder_used[1] and filament_abrasive[1]) ? 1 : (is_extruder_used[2] and filament_abrasive[2]) ? 1 : (is_extruder_used[3] and filament_abrasive[3]) ? 1 : (is_extruder_used[4] and filament_abrasive[4]) ? 1 : 0)} F{(nozzle_high_flow[0] ? 1 : 0)} ; nozzle check\nM862.3 P "MK3.5" ; printer model check\nM862.5 P2 ; g-code level check\nM862.6 P"Input shaper" ; FW feature check\nM862.6 P "MMU3" ; FW feature check\nM115 U6.4.0+11974\n; setup MMU\nM708 A0x1e X12  ; Pulley current to ~200mA\n\nM555 X{(min(print_bed_max[0], first_layer_print_min[0] + 32) - 32)} Y{(max(0, first_layer_print_min[1]) - 4)} W{((min(print_bed_max[0], max(first_layer_print_min[0] + 32, first_layer_print_max[0])))) - ((min(print_bed_max[0], first_layer_print_min[0] + 32) - 32))} H{((first_layer_print_max[1])) - ((max(0, first_layer_print_min[1]) - 4))}\n\nG90 ; use absolute coordinates\nM83 ; extruder relative mode\n\nM140 S{first_layer_bed_temperature[initial_tool]} ; set bed temp\nM104 S170 ; set extruder temp for bed leveling\nM109 R170 ; wait for temp\nM190 S{first_layer_bed_temperature[initial_tool]} ; wait for bed temp\n\n\nG28 ; home all\n\nG29 P1 ; invalidate mbl & probe print area\nG29 P1 X23 Y5 W160 H20 C ; probe near purge place\nG29 P3.2 ; interpolate mbl probes\nG29 P3.13 ; extrapolate mbl outside probe area\nG29 A ; activate mbl\n\n; prepare for purge\nM104 S{first_layer_temperature[initial_tool]}\nG0 X0 Y-4 Z15 F4800 ; move away and ready for the purge\nM109 S{first_layer_temperature[initial_tool]}\n\nT[initial_tool]\nG1 E{parking_pos_retraction + extra_loading_move} F1000 ; load to the nozzle\n\n; Extrude purge line\n\nG92 E0 ; reset extruder position\nG0 E7 X15 Z0.2 F500 ; purge\nG0 X105 E36 F500 ; purge\nG0 X115 E4 F650 ; purge\nG0 X125 E4 F800 ; purge\nG0 X128 Z0.05 F8000 ; wipe, move close to the bed\nG0 X131 Z0.2 F8000 ; wipe, move quickly away from the bed\n\nG92 E0\nM221 S100 ; reset flow to 100%\n
end_gcode = {if layer_z < max_print_height}G1 Z{z_offset+min(max_layer_z+1, max_print_height)} F720 ; Move print head up{endif}\nG1 X241 Y201 F7200 ; park\n{if layer_z < max_print_height}G1 Z{z_offset+min(max_layer_z+49, max_print_height)} F720 ; Move print head further up{endif}\n{if has_wipe_tower}\nG1 E-15 F3000\n{else}\nG1 E2 F5000\nG1 E2 F5500\nG1 E2 F6000\nG1 E-15 F5800\nG1 E-20 F5500\nG1 E10 F3000\nG1 E-10 F3100\nG1 E10 F3150\nG1 E-10 F3250\nG1 E10 F3300\n{endif}\n\nM140 S0 ; turn off heatbed\nM107 ; turn off fan\n\n; Unload filament\nM702\n\nG4 ; wait\nM221 S100 ; reset flow\nM572 S0 ; reset LA\nM104 S0 ; turn off temperature\nM84 ; disable motors\n; max_layer_z = [max_layer_z]
before_layer_gcode = ;BEFORE_LAYER_CHANGE\nG92 E0.0\n;[layer_z]\nM201 X{interpolate_table(extruded_weight_total, (0,4000), (1400,2500), (20000,2500))} Y{interpolate_table(extruded_weight_total, (0,4000), (1400,2500), (20000,2500))}\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]\n{if ! spiral_vase}M74 W[extruded_weight_total]{endif}\n
default_print_profile = 0.20mm SPEED @MK3.5 0.4
default_filament_profile = "Prusament PLA @MMU"

