[filament:Generic PLA @X-Plus 4 + BOX 0.2 nozzle]
inherits = *Generic PLA*
start_filament_gcode = "; Filament gcode\nM900 K0.042 T0.03\n"
filament_max_volumetric_speed = 2
temperature = 210
compatible_printers_condition = printer_model=="X-Plus 4 + BOX" and nozzle_diameter[0]==0.2

# X-Plus 4 0.4 nozzle QIDI filament preset
