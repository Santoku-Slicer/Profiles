[printer:VORON Zero - 0.4mm Nozzle (High Flow)]
inherits = *VORON_CORE_XY*; *VORON_BED_SIZE_120*; *VORON_HEIGHT_120*
printer_model = V0_120
printer_variant = HF0.4
nozzle_diameter = 0.4
nozzle_high_flow = 1
default_print_profile = 0.20mm Standard @V0 - HF0.4mm
max_layer_height = 0.3
min_layer_height = 0.07
printer_notes = Do not remove the following keywords! These keywords are used in the "compatible printer" condition of the print and filament profiles to link the particular print and filament profiles to this printer profile.\nPRINTER_MODEL_VORON_ZERO\nPG\nNO_TEMPLATES

