filament_cost = 30
filament_density = 1.27
filament_max_volumetric_speed = 8
filament_type = PETG
first_layer_bed_temperature = 70
first_layer_temperature = 250
max_fan_speed = 80
min_fan_speed = 40
temperature = 245

