[printer:fdm_marlin_common]
inherits = fdm_machine_common
from = system
instantiation = false
gcode_flavor = marlin2
before_layer_change_gcode = ;BEFORE_LAYER_CHANGE
G92 E0.0
;[layer_z]


machine_start_gcode = M4899 T3 ; Enable v3 jerk and S-curve acceleration 
M104 S150 ; Set hotend temp to 150 degrees to prevent ooze
M190 S{first_layer_bed_temperature[0]} ; set and wait for bed temp to stabilize
M109 S{first_layer_temperature[0]} ; set final nozzle temp to stabilize
G28 ;Home
;LAYER_COUNT:{total_layer_count}
machine_end_gcode = M104 S0
M140 S0
;Retract the filament
G92 E1
G1 E-1 F300
G28 X0 Y0
M18
change_filament_gcode = M600
machine_pause_gcode = M601

