G1 X5 Y20 Z0.28 F3000.0 ; Move over to prevent blob squish
G92 E0
machine_end_gcode = {if max_layer_z < printable_height}G1 Z{z_offset+min(max_layer_z+2, printable_height)} F600 ; Move print head up{endif}
