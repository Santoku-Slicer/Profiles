default_filament_profile = Generic PLA @System
printer_variant = 0.4
default_print_profile = 0.20mm Standard @Geeetech common
nozzle_diameter = 0.4
extruder_type = Bowden
max_layer_height = 0.3
min_layer_height = 0.07
