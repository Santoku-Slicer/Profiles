[printer:fdm_machine_common]
from = system
instantiation = false
printer_technology = FFF
gcode_flavor = klipper
auxiliary_fan = 1
bed_exclude_area = 0x0
before_layer_change_gcode = ;BEFORE_LAYER_CHANGE
;[layer_z]
G92 E0
change_filament_gcode = 
cooling_tube_length = 5
cooling_tube_retraction = 91.5
default_filament_profile = InfiMech Generic PLA
default_print_profile = 0.20mm Standard @InfiMech TX
deretraction_speed = 30
enable_filament_ramming = 1
extra_loading_move = -2
extruder_clearance_height_to_lid = 69
extruder_clearance_height_to_rod = 69
extruder_clearance_radius = 49
extruder_colour = #FCE94F
extruder_offset = 0x0
fan_kickstart = 0
fan_speedup_overhangs = 1
fan_speedup_time = 0
high_current_on_filament_swap = 0
layer_change_gcode = ;AFTER_LAYER_CHANGE
;[layer_z]
machine_end_gcode = PRINT_END
machine_load_filament_time = 0
machine_max_acceleration_e = 5000,5000
machine_max_acceleration_extruding = 20000,20000
machine_max_acceleration_retracting = 5000,5000
machine_max_acceleration_travel = 9000,9000
machine_max_acceleration_x = 20000,20000
machine_max_acceleration_y = 20000,20000
machine_max_acceleration_z = 500,200
machine_max_jerk_e = 2.5,2.5
machine_max_jerk_x = 9,9
machine_max_jerk_y = 9,9
machine_max_jerk_z = 3,0.4
machine_max_speed_e = 30,25
machine_max_speed_x = 600,200
machine_max_speed_y = 600,200
machine_max_speed_z = 20,12
machine_min_extruding_rate = 0,0
machine_min_travel_rate = 0,0
machine_pause_gcode = PAUSE
machine_start_gcode = ;v2.9.2-20240814;
;wiping nozzle start
M106 P3 S0
M140 S[bed_temperature_initial_layer_single]
clean_nozzle_position
;wiping nozzle end
;*************preheat nozzle and hotbed for Z_TILT_ADJUST*************
M140 S[bed_temperature_initial_layer_single]
M104 S130
G1 X110 Y110 F10000 
G4 P200
probe
SET_KINEMATIC_POSITION Z=0 ;Z homing
G1 Z5
M190 S[bed_temperature_initial_layer_single]
Z_TILT_ADJUST 
;*************Z_TILT_ADJUST end*************
M140 S[bed_temperature_initial_layer_single] ;heat hotbed temp set by user
G1 X5 Y5 F8000 
G28 
G1 X{first_layer_print_min[0]-1.5} Y{min(first_layer_print_min[1] + 100,print_bed_max[0])} F6000 
G1 Z0 F400
M104 S[nozzle_temperature_initial_layer] ;heat nozzle temp set by user
M106 S100 ;close head_nozzle fan
G4 P3000
M106 S255 ;close head_nozzle fan
G4 P3000
M106 S100 ;close head_nozzle fan
;*************PRINT START*************
M109 S[nozzle_temperature_initial_layer] ;heat nozzle temp set by user and wait 
M190 S[bed_temperature_initial_layer_single];heat bed temp set by user and wait 
M106 S0 ;close head_nozzle fan
BED_MESH_CLEAR                                  
BED_MESH_PROFILE LOAD=default   # bedmesh load
G92 E0 ;Reset Extruder
;G1 Z4.0 F200 ;Move Z Axis up
G90 ;absolute position
 ; ; ; ; ; ; ; ; ; draw line along model
;G92 E0 ;reset extruder
G1 E3 F300 ;extrude filament
G1 X{first_layer_print_min[0]-1.5} Y{min(first_layer_print_min[1] + 100,print_bed_max[0])} F6000 
G1 Z0.22 F600
G1 X{first_layer_print_min[0]-1.5} Y{max(0, first_layer_print_min[1]-1.5)}  F2000 E10
G1 Z0.22 F600
G1 X{min(first_layer_print_min[0] + 60,print_bed_max[0])} F1200 E12
 ; ; ; ; ; ; ; ; ;draw line along model end 
G4 P200
G1 Z2
G92 E0 ;Reset Extruder
CLEAR_PAUSE
;***********model start************

machine_unload_filament_time = 0
max_layer_height = 0.28
min_layer_height = 0.08
nozzle_hrc = 0
nozzle_type = hardened_steel
nozzle_volume = 151.32
parking_pos_retraction = 92
print_host_webui = 
printable_area = 0x0,220x0,220x220,0x220
printable_height = 250
printer_model = Generic Klipper Printer
printer_notes = 
printer_settings_id = InfiMech TX 0.4 nozzle
printer_variant = 0.4
printhost_apikey = 
printhost_authorization_type = key
printhost_cafile = 
printhost_password = 
printhost_port = 
printhost_ssl_ignore_revoke = 0
printhost_user = 
purge_in_prime_tower = 1
retract_before_wipe = 0%
retract_length_toolchange = 0
retract_lift_above = 0
retract_lift_below = 249
retract_lift_enforce = All Surfaces
retract_restart_extra = 0
retract_restart_extra_toolchange = 0
retract_when_changing_layer = 1
retraction_length = 0.5
retraction_minimum_travel = 1
retraction_speed = 30
scan_first_layer = 0
silent_mode = 0
single_extruder_multi_material = 1
template_custom_gcode = 
thumbnails = 300x300
upward_compatible_machine = 
use_firmware_retraction = 0
use_relative_e_distances = 1
wipe = 1
wipe_distance = 2
z_hop = 0.4
z_hop_types = Normal Lift

