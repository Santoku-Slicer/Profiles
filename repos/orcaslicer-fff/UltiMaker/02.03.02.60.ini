inherits = fdm_machine_common
from = system
setting_id = GM001
instantiation = true
printer_model = UltiMaker 2
default_print_profile = 0.18mm Standard @UltiMaker 2
nozzle_diameter = 0.4
printable_area = 0x0,224x0,224x225,0x225
