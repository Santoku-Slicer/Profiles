[printer:Raise3D Pro3 0.4 nozzle (Dual)]
inherits = fdm_machine_common
from = system
setting_id = GM001
instantiation = true
printer_model = Raise3D Pro3
default_print_profile = 0.20mm Standard @Raise3D Pro3
nozzle_diameter = 0.4,0.4
extruder_colour = #FCE94F,#FCE94F
extruder_offset = 0x0,0x0
printable_area = 0x0,340x0,340x300,0x300
printable_height = 300
nozzle_type = hardened_steel
auxiliary_fan = 0
machine_max_acceleration_e = 3000,3000
machine_max_acceleration_extruding = 1000,300
machine_max_acceleration_retracting = 3000,1500
machine_max_acceleration_travel = 1500,500
machine_max_acceleration_x = 1000,1000
machine_max_acceleration_y = 1000,1000
machine_max_acceleration_z = 100,100
machine_max_speed_e = 120,120
machine_max_speed_x = 500,200
machine_max_speed_y = 500,200
machine_max_speed_z = 12,12
machine_max_jerk_e = 5,5
machine_max_jerk_x = 5,5
machine_max_jerk_y = 5,5
machine_max_jerk_z = 0.4,0.4
max_layer_height = 0.4,0.4
min_layer_height = 0.1,0.1
printer_settings_id = Raise3D
retraction_minimum_travel = 0.6,0.6
retract_before_wipe = 0%,0%
retraction_length = 0.5,0.5
retract_length_toolchange = 2,2
retract_when_changing_layer = 1,1
retract_restart_extra = 0,0
retract_restart_extra_toolchange = 0,0
retraction_speed = 40,40
deretraction_speed = 0,0
wipe = 1,1
single_extruder_multi_material = 1
change_filament_gcode = 
machine_pause_gcode = ; pause print
M2000
default_filament_profile = Generic PLA @System
machine_start_gcode = ;Bounding Box: {digits(first_layer_print_min[0],0,2)} {if(first_layer_print_max[0]>300)}{300}{else}{digits(first_layer_print_max[0],0,2)}{endif} {digits(first_layer_print_min[1],0,2)} {if(first_layer_print_max[1]>300)}{300}{else}{digits(first_layer_print_max[1],0,2)}{endif}

M104 T0 S{nozzle_temperature_initial_layer[0] - 30} ; raise extruder one temp
M104 T1 S{nozzle_temperature_initial_layer[1] - 30} ; raise extruder two temp
M190 S{max(bed_temperature_initial_layer_single, bed_temperature_initial_layer_single)} ; wait for bed temp
M109 T1 S{nozzle_temperature_initial_layer[1]} ; wait for extruder two temp
T1
G21
G90
M82
M107
M106 P2 S0
G1 Z0.3 F500
G92 E0
G1 Z0.3 F400
G1 X60 Y{random(2,8)} F1000
G1 X110 Y{random(2,8)} E30 F200
G1 Z0.3 E15 F200
G92 E0
G1 Z10 F2000 ; move up from purge line
G1 X170 F2000 ; move away from purge line
M104 T1 S{nozzle_temperature_initial_layer[1] - 30} ; lower extruder two temp
M109 T0 S{nozzle_temperature_initial_layer[0]} ; wait for extruder one temp
T0
G1 Z0.3 F400
G1 X220 Y{random(2,8)} F1000
G1 X270 Y{random(2,8)} E18 F200
G1 Z5 E15 F200
G92 E0
G1 Z10 F2000 ; move up from purge line
G1 Y30 F2000 ; move away from purge line
M104 T0 S{nozzle_temperature_initial_layer[1] - 30} ; lower extruder one temp
G92 E0
G1 X{(first_layer_print_max[0] + first_layer_print_min[0])/2} Y{(first_layer_print_max[1] + first_layer_print_min[1])/2} Z{initial_layer_print_height} ; move to center of print
M117 Printing...
machine_end_gcode = M221 T0 S100
M104 S0
M140 S0
M107
M106 P2 S0
G91
G1 E-1 F300
G1 Z+0.5 E-5 X-20 Y-20 F9000.00
G28 X0 Y0
M84
G90
toolchange_gcode = ; layer [layer_num] tool change
{if layer_z < initial_layer_print_height + layer_height * 2}
M104 T[current_extruder] S{nozzle_temperature_initial_layer[current_extruder] - 30}
M109 T[next_extruder] S{nozzle_temperature_initial_layer[next_extruder]}
{else}
M104 T[current_extruder] S{nozzle_temperature[current_extruder] - 30}
M109 T[next_extruder] S{nozzle_temperature[next_extruder]}
{endif}
before_layer_change_gcode = ; before layer [layer_num] change
G92 E0
{if layer_z <= initial_layer_print_height + layer_height * 2}
M140 S{max(bed_temperature_initial_layer_single, bed_temperature_initial_layer_single)}
{else}
M140 S{max(bed_temperature[0], bed_temperature[1])}
{endif}
{if (filament_type[0] =="PLA" or filament_type[0] =="PETG")}
{if layer_z >= initial_layer_print_height + layer_height * 2}
M106 P2 S150
{elsif layer_z >= initial_layer_print_height + layer_height * 1}
M106 P2 S100
{else}
M106 P2 S0
{endif}
{endif}
layer_change_gcode = ;AFTER_LAYER_CHANGE
;[layer_z]
scan_first_layer = 0

