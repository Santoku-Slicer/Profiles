setting_id = GM003
from = system
instantiation = true
inherits = fdm_machine_common
printer_model = Artillery Sidewinder X1
default_print_profile = 0.20mm Standard @Artillery X1
nozzle_diameter = 0.4
bed_exclude_area = 0x0
printable_area = 0x0,300x0,300x300,0x300
printable_height = 400
nozzle_type = brass
auxiliary_fan = 0
machine_max_acceleration_extruding = 1250,1250
machine_max_acceleration_retracting = 1250,1250
machine_max_acceleration_travel = 1000,1000
machine_max_acceleration_x = 1000,960
machine_max_acceleration_y = 1000,960
machine_max_acceleration_z = 100,100
machine_max_speed_e = 120,120
machine_max_speed_x = 200,100
machine_max_speed_y = 200,100
machine_max_speed_z = 12,12
machine_max_jerk_e = 1.5,1.5
machine_max_jerk_x = 8,8
machine_max_jerk_y = 8,8
machine_max_jerk_z = 0.4,0.4
machine_max_junction_deviation = 0.013,0
max_layer_height = 0.32
min_layer_height = 0.08
printer_settings_id = Artillery
retraction_minimum_travel = 1
retract_before_wipe = 0%
retraction_length = 1
retract_length_toolchange = 4
retraction_speed = 35
deretraction_speed = 0
single_extruder_multi_material = 1
change_filament_gcode = 
machine_pause_gcode = M0
default_filament_profile = Artillery Generic PLA
machine_start_gcode = ; Initial setups
G90 ; use absolute coordinates
M83 ; extruder relative mode
M220 S100 ; reset speed factor to 100%
M221 S100 ; reset extrusion rate to 100%

; Set the heating
M190 S[bed_temperature_initial_layer_single] ; wait for bed to heat up
M104 S[nozzle_temperature_initial_layer] ; start nozzle heating but don't wait

; Home
G1 Z3 F3000 ; move z up little to prevent scratching of surface
G28 ; home all axes
G1 X3 Y3 F5000 ; move to corner of the bed to avoid ooze over centre

; Wait for final heating
M109 S[nozzle_temperature_initial_layer] ; wait for the nozzle to heat up
M190 S[bed_temperature_initial_layer_single] ; wait for the bed to heat up

; Return to prime position, Prime line routine
G92 E0 ; Reset Extruder
G1 Z3 F3000 ; move z up little to prevent scratching of surface
G1 X10 Y.5 Z0.25 F5000.0 ; Move to start position
G1 X100 Y.5 Z0.25 F1500.0 E15 ; Draw the first line
G1 X100 Y.2 Z0.25 F5000.0 ; Move to side a little
G1 X10 Y.2 Z0.25 F1500.0 E30 ; Draw the second line
G92 E0 ; Reset Extruder
M221 S{if layer_height<0.075}100{else}95{endif}
machine_end_gcode = G4 ; wait
G92 E0 ; prepare to retract
G1 E-0.5 F3000; retract to avoid stringing

; Anti-stringing end wiggle
G91 ; use relative coordinates
G1 X1 Y1 F1200

; Raise nozzle and present bed
{if layer_z < printable_height}G1 Z{z_offset+min(layer_z+120, printable_height)}{endif} ; Move print head up
G90 ; use absolute coordinates

; Reset print setting overrides
M200 D0 ; disable volumetric e
M220 S100 ; reset speed factor to 100%
M221 S100 ; reset extrusion rate to 100%

; Shut down printer
M106 S0 ; turn-off fan
M104 S0 ; turn-off hotend
M140 S0 ; turn-off bed
M150 P0 ; turn off led
M85 S0 ; deactivate idle timeout
M84 ; disable motors

before_layer_change_gcode = ;BEFORE_LAYER_CHANGE
G92 E0
;[layer_z]


layer_change_gcode = ;AFTER_LAYER_CHANGE
;[layer_z]
scan_first_layer = 0

