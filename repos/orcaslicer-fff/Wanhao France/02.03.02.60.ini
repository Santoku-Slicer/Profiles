[printer:fdm_machine_common]
from = system
instantiation = false
printer_technology = FFF
deretraction_speed = 40
extruder_colour = #FCE94F
extruder_offset = 0x0
gcode_flavor = marlin
silent_mode = 0
support_chamber_temp_control = 0
support_air_filtration = 0
machine_max_acceleration_e = 5000
machine_max_acceleration_extruding = 10000
machine_max_acceleration_retracting = 1000
machine_max_acceleration_x = 10000
machine_max_acceleration_y = 10000
machine_max_acceleration_z = 500
machine_max_speed_e = 60
machine_max_speed_x = 500
machine_max_speed_y = 500
machine_max_speed_z = 10
machine_max_jerk_e = 5
machine_max_jerk_x = 8
machine_max_jerk_y = 8
machine_max_jerk_z = 0.4
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
max_layer_height = 0.32
min_layer_height = 0.08
printable_height = 250
extruder_clearance_radius = 65
extruder_clearance_height_to_rod = 36
extruder_clearance_height_to_lid = 140
nozzle_diameter = 0.4
printer_settings_id = 
printer_variant = 0.4
retraction_minimum_travel = 2
retract_before_wipe = 70%
retract_when_changing_layer = 1
retraction_length = 5
retract_length_toolchange = 1
z_hop = 0
retract_restart_extra = 0
retract_restart_extra_toolchange = 0
retraction_speed = 60
single_extruder_multi_material = 1
change_filament_gcode = 
wipe = 1
support_multi_bed_types = 1
template_custom_gcode = ;;;;;;;;;;;;;;;;;;;;;;;;CUSTOM G-CODE;;;;;;;;;;;;;;;;;;;;;;;;
{if curr_bed_type=="Textured PEI Plate"}
 SET_GCODE_OFFSET Z=-0.00
{else}
SET_GCODE_OFFSET Z=0.0
{endif}
{if curr_bed_type=="Cool Plate"}

;available bed types are:
;"Cool Plate"
;"Engineering Plate"
;"High Temp Plate"
;"Textured PEI Plate"
;;;;;;;;;;;;;;;;;;;;;;;;;CUSTOM G-CODE;;;;;;;;;;;;;;;;;;;;;;;;

z_hop_types = Normal Lift
before_layer_change_gcode = ;BEFORE_LAYER_CHANGE
;[layer_z]
G92 E0

default_print_profile = 0.16mm Optimal @Bambu Lab X1 Carbon 0.4 nozzle
machine_start_gcode = G0 Z20 F9000
G92 E0; G1 E-10 F1200
G28
M970 Q1 A10 B10 C130 K0
M970 Q1 A10 B131 C250 K1
M974 Q1 S1 P0
M970 Q0 A10 B10 C130 H20 K0
M970 Q0 A10 B131 C250 K1
M974 Q0 S1 P0
M220 S100 ;Reset Feedrate
M221 S100 ;Reset Flowrate
G29 ;Home
G90;
G92 E0 ;Reset Extruder 
G1 Z2.0 F3000 ;Move Z Axis up 
G1 X10.1 Y20 Z0.28 F5000.0 ;Move to start position
M109 S205;
G1 X10.1 Y200.0 Z0.28 F1500.0 E15 ;Draw the first line
G1 X10.4 Y200.0 Z0.28 F5000.0 ;Move to side a little
G1 X10.4 Y20 Z0.28 F1500.0 E30 ;Draw the second line
G92 E0 ;Reset Extruder 
G1 X110 Y110 Z2.0 F3000 ;Move Z Axis up
machine_end_gcode = M400 ; wait for buffer to clear
G92 E0 ; zero the extruder
G1 E-4.0 F3600; retract 
G91
G1 Z3;
M104 S0 ; turn off hotend
M140 S0 ; turn off bed
M106 S0 ; turn off fan
G90 
G0 X110 Y200 F3600 
print_end

[printer:D12 230 PRO M2 DIRECT 0.4 nozzle]
inherits = fdm_machine_common
from = system
setting_id = GM003
instantiation = true
printer_model = D12 230 PRO M2 DIRECT
gcode_flavor = marlin2
default_print_profile = 0.20mm Standard @Wanhao-D12-230
nozzle_diameter = 0.4
printable_area = 0x0,230x0,230x230,0x230
printable_height = 240
nozzle_type = brass
auxiliary_fan = 0
printer_variant = 0.4
default_filament_profile = YUMI PLA Direct Drive
before_layer_change_gcode = ;BEFORE_LAYER_CHANGE
;[layer_z]
G92 E0
change_filament_gcode = M600
extra_loading_move = -2
extruder_clearance_height_to_lid = 140
extruder_clearance_height_to_rod = 36
extruder_clearance_radius = 65
nozzle_height = 4
thumbnails = 48x48/PNG, 300x300/PNG
wipe_distance = 2
z_hop = 0.4
z_hop_types = Auto Lift
deretraction_speed = 70
machine_max_acceleration_e = 6000
machine_max_acceleration_extruding = 10000
machine_max_acceleration_retracting = 5000
machine_max_acceleration_travel = 5000,500
machine_max_acceleration_x = 1200
machine_max_acceleration_y = 1000
machine_max_acceleration_z = 500
machine_max_speed_e = 50
machine_max_speed_x = 200
machine_max_speed_y = 200
machine_max_speed_z = 15
machine_max_jerk_e = 2.5
machine_max_jerk_x = 14
machine_max_jerk_y = 14
machine_max_jerk_z = 0.2
max_layer_height = 0.32
min_layer_height = 0.08
retract_before_wipe = 0%
retraction_length = 2
retraction_minimum_travel = 2
retraction_speed = 70
retract_length_toolchange = 0
retract_when_changing_layer = 0
machine_end_gcode = ; Wanhao D12-230 Default End Gcode
G91                     ; Mode déplacement relatif
G1 E-2 F300             ; Retrait léger du filament pour éviter le suintement
G1 Z10 F1200             ; Monte la tête de 10 mm
G90                     ; Retour en position absolue
G1 X0 Y200 F3000         ; Déplace la tête vers l'arrière pour dégager la pièce
M104 S0                  ; Éteint la chauffe de la buse
M140 S0                  ; Éteint la chauffe du plateau
M107                     ; Arrête tous les ventilateurs
M106 S0 P3               ; Arrête le ventilateur de la carte mère
M106 S0 P2               ; Arrête le ventilateur auxiliaire
M84 X Y E                ; Désactive les moteurs des axes X, Y et de l'extrudeur
SET_VELOCITY_LIMIT ACCEL=2000 ACCEL_TO_DECEL=1000
machine_pause_gcode = M600
machine_start_gcode = G31
save_last_file
SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True
G21                                ; set metrics values
M104 S[nozzle_temperature_initial_layer]               ; set extruder temperature
M140 S[bed_temperature_initial_layer_single]           ; set bed temperature
G91                                ; set relative positioning mode
G28                                ; home
G90                                ; set absolute positioning mode
G1 X0 Y0 F3000                      ; park head
M117                                ; Purge extrudeur
G92 E0                             ; Reset extrudeur
M109 S[nozzle_temperature_initial_layer]                         ; set and wait extruder temperature
M190 S[bed_temperature_initial_layer_single]            ; set and wait bed temperature
BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5 ; adaptive bed leveling

G1 Z1.0 F3000                      ; Prépare la buse à une petite hauteur
M83                                ; Positionnement relatif pour l'extrudeur

; Purge longue à l'avant du plateau (Y=0), centrée
G1 X{print_bed_max[0] / 2 - 20} Y0 Z0.3 F5000     ; Début ligne 1
G1 X{print_bed_max[0] / 2 + 20} Y0 Z0.3 F750 E24  ; Ligne 1 (2x plus longue)
G1 X{print_bed_max[0] / 2 - 20} Y1 Z0.3 F5000     ; Légère montée et retour
G1 X{print_bed_max[0] / 2 + 20} Y1 Z0.3 F750 E24  ; Ligne 2

G1 E-5 F1800                                     ; Rétraction
M82                                              ; Positionnement absolu pour l'extrudeur
G92 E0                                           ; Reset extrusion
G1 Z1.0 F3000                                    ; Légère montée

