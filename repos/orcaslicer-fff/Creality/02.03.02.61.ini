default_print_profile = 0.20mm Standard @Creality CR-M4
nozzle_diameter = 0.4
printable_height = 470
printable_area = 0x0,450x0,450x450,0x450
machine_max_speed_e = 50,50
machine_max_acceleration_z = 100,100
machine_max_acceleration_extruding = 700,700
machine_max_jerk_x = 10,10
machine_max_jerk_y = 10,10
retraction_minimum_travel = 0.8
retraction_length = 0.8
retraction_speed = 40
nozzle_type = undefine
auxiliary_fan = 0
machine_start_gcode = M220 S100 ;Reset Feedrate
M221 S100 ;Reset Flowrate
M140 S[bed_temperature_initial_layer_single] ; set final bed temp
G28 ;Home
G92 E0 ;Reset Extruder
G1 Z2.0 F3000 ;Move Z Axis up
G1 X10.1 Y20 Z0.28 F5000.0 ;Move to start position
M104 S[nozzle_temperature_initial_layer] ; set final nozzle temp
M190 S[bed_temperature_initial_layer_single] ; wait for bed temp to stabilize
M109 S[nozzle_temperature_initial_layer] ; wait for nozzle temp to stabilize
G1 X10.1 Y145.0 Z0.28 F1500.0 E15 ;Draw the first line
G1 X10.4 Y145.0 Z0.28 F5000.0 ;Move to side a little
G1 X10.4 Y20 Z0.28 F1500.0 E30 ;Draw the second line
G92 E0 ;Reset Extruder
G1 E-1.0000 F1800 ;Retract a bit
G1 Z2.0 F3000 ;Move Z Axis up
G1 E0.0000 F1800
machine_end_gcode = G91 ;Relative positionning
G1 E-2 F2700 ;Retract a bit
G1 E-2 Z0.2 F2400 ;Retract and raise Z
G1 X5 Y5 F3000 ;Wipe out
G1 Z10 ;Raise Z more
G90 ;Absolute positionning
G1 X0 Y0 ;Present print
M106 S0 ;Turn-off fan
M104 S0 ;Turn-off hotend
M140 S0 ;Turn-off bed
M84 X Y E ;Disable all steppers but Z

