machine_max_acceleration_y = 500,500
machine_max_acceleration_z = 100,100
machine_max_speed_e = 60,60
machine_max_speed_x = 500,500
machine_max_speed_y = 500,500
machine_max_speed_z = 10,10
machine_max_jerk_e = 5,5
machine_max_jerk_x = 8,8
machine_max_jerk_y = 8,8
machine_max_jerk_z = 0.4,0.4
machine_max_junction_deviation = 0.051,0
max_layer_height = 0.4
min_layer_height = 0.08
printer_settings_id = Lulzbot4-5
retraction_minimum_travel = 2
retract_before_wipe = 70%
retraction_length = 5
retract_length_toolchange = 1
deretraction_speed = 40
single_extruder_multi_material = 1
default_filament_profile = Lulzbot 2.85mm PLA
machine_start_gcode = ;This G-Code has been generated specifically for the Lulzbot Taz 4 and 5 - translated from CuraLE 4.13.10 by Wrathernaut
M73 P0; clear GLCD progress bar
M75; start GLCD timer
M140 S{bed_temperature_initial_layer[0]}; start bed heating up
G90; absolute positioning
M107; disable fans
M82; set extruder to absolute mode
G28 X0 Y0; home X and Y
G28 Z0; home Z
G1 Z15.0 F175; move extruder up
M117 Heating...; progress indicator message on LCD
M109 R{nozzle_temperature_initial_layer[0]}; wait for extruder to reach printing temp
M190 R{bed_temperature_initial_layer[0]}; wait for bed to reach printing temp
G92 E0; set extruder position to 0
G1 F200 E0; prime the nozzle with filament
G92 E0; re-set extruder position to 0
G1 F175; set travel speed
M203 X192 Y208 Z3; set limits on travel speed
M117 TAZ Printing...; progress indicator message on LCD
;Start G-Code End
machine_end_gcode = ;End G-Code Begin
M400; wait for moves to finish
M140 S0; disable hotend
M104 S0; disable bed heater
M107; disable fans
G91; relative positioning
G1 E-1 F300; filament retraction to release pressure
G1 Z0.5 E-5 X-20 Y-20 F3000; lift up and retract even more filament
M77;stopGLCD timer
G90;absolute positioning
G1 X0 Y250;move to cooling position
M84;disable steppers
M117 Print Complete.;print complete message
before_layer_change_gcode = G92 E0; reset relative extrusion
layer_change_gcode = ; LAYER:{layer_num}
M117 Layer: {layer_num +1} / [total_layer_count]
change_filament_gcode = M400
M600 B10 X115 Y-10 Z10
M190 S{bed_temperature[0]}
M109 S{temperature[0]}
machine_pause_gcode = M600 B10
scan_first_layer = 0

