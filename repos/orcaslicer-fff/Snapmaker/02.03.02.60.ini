M109 S{nozzle_temperature_initial_layer[(initial_extruder % 2 == 0 ? min(initial_extruder + initial_extruder, 63) : max(initial_extruder - (1-initial_extruder), 0))]} C3 W1
G1 E3 F200
G92 E0
G1 X{( initial_extruder % 2 == 0 ? 0 : 230 )} E3.42995 F3420.0
G92 E0

