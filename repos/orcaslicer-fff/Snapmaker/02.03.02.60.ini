[printer:fdm_idex]
inherits = fdm_common
from = system
instantiation = false
wipe = 1
wipe_distance = 2
retraction_speed = 25,25
deretraction_speed = 25,25
bed_model = Snapmaker J1_bed.stl
bed_texture = Snapmaker J1_texture.svg
