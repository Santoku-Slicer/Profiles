[printer:Prusa MK4 0.25 nozzle]
inherits = fdm_machine_common
from = system
setting_id = GM004
instantiation = true
gcode_flavor = marlin2
printer_model = Prusa MK4
default_filament_profile = Prusa Generic PLA @MK4
default_print_profile = 0.08mm Standard @MK4
nozzle_diameter = 0.25
printer_variant = 0.25
bed_exclude_area = 0x0
printable_area = 0x0,250x0,250x210,0x210
machine_max_acceleration_e = 2500,2500
machine_max_acceleration_extruding = 4000,4000
machine_max_acceleration_retracting = 1200,1200
machine_max_acceleration_x = 4000,4000
machine_max_acceleration_y = 4000,4000
machine_max_acceleration_z = 200,200
machine_max_acceleration_travel = 4000,4000
max_layer_height = 0.16
min_layer_height = 0.04
host_type = prusalink
printable_height = 220
machine_end_gcode = {if layer_z < max_print_height}G1 Z{z_offset+min(layer_z+1, max_print_height)} F720 ; Move print head up{endif}
M104 S0 ; turn off temperature
M140 S0 ; turn off heatbed
M107 ; turn off fan
G1 X241 Y170 F3600 ; park
{if layer_z < max_print_height}G1 Z{z_offset+min(layer_z+23, max_print_height)} F300 ; Move print head up{endif}
G4 ; wait
M572 S0 ; reset PA
M593 X T2 F0 ; disable IS
M593 Y T2 F0 ; disable IS
M84 X Y E ; disable motors
; max_layer_z = [max_layer_z]
machine_pause_gcode = M601
machine_start_gcode = M17 ; enable steppers
M862.1 P[nozzle_diameter] ; nozzle diameter check
M862.3 P "MK4" ; printer model check
M862.5 P2 ; g-code level check
M862.6 P"Input shaper" ; FW feature check
M115 U5.0.0-RC+11963

M555 X{(min(print_bed_max[0], first_layer_print_min[0] + 32) - 32)} Y{(max(0, first_layer_print_min[1]) - 4)} W{((min(print_bed_max[0], max(first_layer_print_min[0] + 32, first_layer_print_max[0])))) - ((min(print_bed_max[0], first_layer_print_min[0] + 32) - 32))} H{((first_layer_print_max[1])) - ((max(0, first_layer_print_min[1]) - 4))}

G90 ; use absolute coordinates
M83 ; extruder relative mode

M140 S[first_layer_bed_temperature] ; set bed temp
{if filament_type[initial_tool]=="PC" or filament_type[initial_tool]=="PA"}
M104 S{first_layer_temperature[initial_tool]-25} ; set extruder temp for bed leveling
M109 R{first_layer_temperature[initial_tool]-25} ; wait for temp
{elsif filament_type[initial_tool]=="FLEX"}
M104 S210 ; set extruder temp for bed leveling
M109 R210 ; wait for temp
{else}
M104 S170 ; set extruder temp for bed leveling
M109 R170 ; wait for temp
{endif}

M84 E ; turn off E motor

G28 ; home all without mesh bed level

G1 X{10 + 32} Y-4 Z5 F4800

M302 S160 ; lower cold extrusion limit to 160C

{if filament_type[initial_tool]=="FLEX"}
G1 E-4 F2400 ; retraction
{else}
G1 E-2 F2400 ; retraction
{endif}

M84 E ; turn off E motor

G29 P9 X10 Y-4 W32 H4

{if first_layer_bed_temperature[initial_tool]<=60}M106 S100{endif}

G0 Z40 F10000

M190 S[first_layer_bed_temperature] ; wait for bed temp

M107

;
; MBL
;
M84 E ; turn off E motor
G29 P1 ; invalidate mbl & probe print area
G29 P1 X0 Y0 W50 H20 C ; probe near purge place
G29 P3.2 ; interpolate mbl probes
G29 P3.13 ; extrapolate mbl outside probe area
G29 A ; activate mbl

; prepare for purge
M104 S{first_layer_temperature[0]}
G0 X0 Y-4 Z15 F4800 ; move away and ready for the purge
M109 S{first_layer_temperature[0]}

G92 E0
M569 S0 E ; set spreadcycle mode for extruder

;
; Extrude purge line
;
G92 E0 ; reset extruder position
G1 E{(filament_type[0] == "FLEX" ? 4 : 2)} F2400 ; deretraction after the initial one before nozzle cleaning
G0 E7 X15 Z0.2 F500 ; purge
G0 X25 E4 F500 ; purge
G0 X35 E4 F650 ; purge
G0 X45 E4 F800 ; purge
G0 X{45 + 3} Z{0.05} F{8000} ; wipe, move close to the bed
G0 X{45 + 3 * 2} Z0.2 F{8000} ; wipe, move quickly away from the bed

G92 E0
M221 S100 ; set flow to 100%
before_layer_change_gcode = ;BEFORE_LAYER_CHANGE
G92 E0.0
;[layer_z]
M201 X{interpolate_table(extruded_weight_total, (0,4000), (1400,2500), (10000,2500))} Y{interpolate_table(extruded_weight_total, (0,4000), (1400,2500), (10000,2500))}
{if !spiral_mode}M74 W[extruded_weight_total]{endif}
change_filament_gcode = M600
G1 E0.4 F1500 ; prime after color change
layer_change_gcode = ;AFTER_LAYER_CHANGE
;[layer_z]
printer_notes = Don't remove the following keywords! These keywords are used in the "compatible printer" condition of the print and filament profiles to link the particular print and filament profiles to this printer profile.
PRINTER_MODEL_MK4IS
PG
